name: 每日 Facebook 自動發文

on:
  schedule:
    # GitHub Actions 使用 UTC；02:17 UTC = 台灣時間 10:17。
    # 避開整點的排程尖峰，降低 GitHub 延遲觸發的機率。
    - cron: "17 2 * * *"
    # 台灣時間 15:47 再檢查一次；當天未發文時才會補發。
    - cron: "47 7 * * *"
  workflow_dispatch:

concurrency:
  group: daily-facebook-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 取得專案
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: 安裝套件
        run: python -m pip install -r requirements.txt

      - name: 發布 Facebook 貼文
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python auto_post.py
